version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=ykflow_db
      - POSTGRES_USER=ykflow_user
      - POSTGRES_PASSWORD=supersecretpassword
    ports:
      - "5432:5432"

  web:
    build: .
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn conf.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 90"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=ykflow_db
      - DB_USER=ykflow_user
      - DB_PASSWORD=supersecretpassword
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

volumes:
  postgres_data:
  static_volume:
  media_volume: